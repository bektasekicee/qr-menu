<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>QR Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:#F8F8FA;color:#1A1A2E;overflow-x:hidden}
/* ── Landing ── */
.landing{position:fixed;inset:0;z-index:500;background:linear-gradient(150deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;transition:opacity .35s ease}
.landing.hidden{opacity:0;pointer-events:none}
.l-card{max-width:340px;width:100%}
.l-icon{font-size:56px;margin-bottom:14px}
.l-name{font-size:22px;font-weight:800;letter-spacing:-.3px}
.l-table{font-size:13px;opacity:.65;margin-top:4px;margin-bottom:16px}
.l-bal{font-size:12px;background:rgba(255,255,255,.1);backdrop-filter:blur(4px);padding:8px 16px;border-radius:10px;display:inline-block;margin-bottom:24px;letter-spacing:.2px}
.l-btns{display:grid;gap:10px}
.l-btn{padding:15px;border-radius:13px;font-size:14px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .15s;font-family:inherit}
.l-btn:active{transform:scale(.96)}
.l-btn.primary{background:#fff;color:#1A1A2E;box-shadow:0 4px 15px rgba(0,0,0,.15)}
.l-btn.sec{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18)}
.l-load{opacity:.5;font-size:13px;padding:30px 0}
/* ── Header ── */
.hdr{background:linear-gradient(135deg,#1A1A2E,#16213E);color:#fff;padding:13px 16px;text-align:center;position:sticky;top:0;z-index:100;display:none}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-.2px}
.hdr-sub{font-size:11px;opacity:.6;margin-top:1px}
.hdr-back{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px}
/* ── Categories ── */
.cats{display:flex;gap:7px;padding:10px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid #eee;position:sticky;top:49px;z-index:99;display:none}
.cats::-webkit-scrollbar{display:none}
.cat{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;border:1.5px solid #ddd;background:#fff;color:#888;cursor:pointer;transition:.15s}
.cat.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
/* ── Product Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:12px;display:none}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:transform .12s}
.card:active{transform:scale(.97)}
.card-img{height:88px;display:flex;align-items:center;justify-content:center;background:#f3f3f5;font-size:34px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:8px 10px 10px}
.card-body h3{font-size:12px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-body .pr{font-size:14px;font-weight:800;color:#E53E3E}
.card-body .add{float:right;width:26px;height:26px;border-radius:50%;background:#1A1A2E;color:#fff;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:-2px}
/* ── Bottom Bar ── */
.bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#E53E3E,#F56565);color:#fff;padding:13px 18px;display:none;justify-content:space-between;align-items:center;cursor:pointer;z-index:200;border-radius:16px 16px 0 0}
.bar .cnt{background:rgba(255,255,255,.22);padding:2px 10px;border-radius:10px;font-weight:700;font-size:13px}
/* ── Overlays ── */
.ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.45);backdrop-filter:blur(2px)}
.ov.show{display:flex;align-items:flex-end}
.ov-box{width:100%;max-height:85vh;background:#fff;border-radius:20px 20px 0 0;overflow-y:auto;padding:20px 18px 90px}
.ov-x{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:4px}
.ov-title{font-size:17px;font-weight:800;margin-bottom:14px}
.sub-btn{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:12px;font-family:inherit;transition:.15s}
.sub-btn:active{transform:scale(.98)}
.sub-btn.green{background:linear-gradient(135deg,#38A169,#2F855A);color:#fff}
.sub-btn.dark{background:linear-gradient(135deg,#1A1A2E,#16213E);color:#fff}
/* ── Bill ── */
.bi{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f0f0f0}
.bt{display:flex;justify-content:space-between;padding:10px 0;font-weight:800;font-size:15px;border-top:2px solid #1A1A2E;margin-top:6px}
.bt.green{color:#38A169}.bt.red{color:#E53E3E;font-size:17px}
/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:600;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
/* ── Empty ── */
.empty{text-align:center;padding:48px 20px;color:#aaa;font-size:14px}
</style>
</head>
<body>

<!-- LANDING -->
<div class="landing" id="landing"><div class="l-card">
  <div class="l-icon">🍽️</div>
  <div class="l-name" id="lName">Restoran</div>
  <div class="l-table" id="lTable">Yükleniyor...</div>
  <div class="l-bal" id="lBal" style="display:none"></div>
  <div class="l-btns" id="lBtns"><div class="l-load">⏳</div></div>
</div></div>

<!-- HEADER -->
<div class="hdr" id="hdr">
  <button class="hdr-back" onclick="goLanding()">←</button>
  <div class="hdr-title" id="hdrTitle">Menü</div>
  <div class="hdr-sub" id="hdrSub"></div>
</div>

<!-- CATEGORIES -->
<div class="cats" id="cats"></div>

<!-- PRODUCTS -->
<div class="grid" id="grid"></div>

<!-- CART BAR -->
<div class="bar" id="bar" onclick="openCart()">
  <span>🛒 Sepet <span class="cnt" id="barCnt">0</span></span>
  <span style="font-size:15px;font-weight:800" id="barTot">₺0</span>
</div>

<!-- CART OVERLAY -->
<div class="ov" id="cartOv"><div class="ov-box" style="position:relative">
  <button class="ov-x" onclick="closeOv('cartOv')">✕</button>
  <div class="ov-title">🛒 Sepetiniz</div>
  <div id="cartList"></div>
  <div style="display:flex;justify-content:space-between;margin-top:10px;font-weight:800;font-size:15px"><span>Toplam</span><span id="cartTot" style="color:#E53E3E"></span></div>
  <button class="sub-btn green" id="orderBtn" onclick="sendOrder()">✓ Siparişi Gönder</button>
</div></div>

<!-- BILL OVERLAY -->
<div class="ov" id="billOv"><div class="ov-box" style="position:relative">
  <button class="ov-x" onclick="closeBill()">✕</button>
  <div class="ov-title">🧾 Hesap Detayı</div>
  <div id="billBody"><div class="l-load">Yükleniyor...</div></div>
</div></div>

<!-- PAYMENT OVERLAY -->
<div class="ov" id="payOv"><div class="ov-box" style="position:relative">
  <button class="ov-x" onclick="closePay()">✕</button>
  <div id="payBody"></div>
</div></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══ CONFIG ═══ */
const API = 'https://hdpzqkwrvfjaemiwucyk.supabase.co/functions/v1/qr-menu';
const QR = new URLSearchParams(location.search).get('qr') || '';
let TS = null; // table-status
let SID = null;
let BRANCH = 0;
let cats = [], prods = [], cart = [], selCat = null;
let PAY_ID = null, PAY_BUSY = false;
const C = '₺';

/* ═══ INIT ═══ */
async function init() {
  if (!QR) { document.getElementById('lTable').textContent = 'Geçersiz QR kod'; return; }
  try {
    const r = await fetch(API + '/api/table-status?qr=' + QR);
    TS = await r.json();
    if (TS.error) { document.getElementById('lTable').textContent = TS.error; }
    else {
      SID = TS.session_id;
      BRANCH = TS.branch_id;
      document.getElementById('lName').textContent = TS.restaurant_name || 'Restoran';
      document.getElementById('lTable').textContent = '📍 ' + (TS.table_name || 'Masa');
      document.getElementById('hdrTitle').textContent = TS.restaurant_name || 'Menü';
      document.getElementById('hdrSub').textContent = '📍 ' + (TS.table_name || '');
    }
  } catch (e) { TS = { show_menu: true, show_bill: false, show_pay: false }; }
  renderLanding();
  const pp = new URLSearchParams(location.search).get('payment');
  if (pp === 'ok') setTimeout(() => toast('✅ Ödemeniz alındı!'), 400);
  if (pp === 'fail') setTimeout(() => toast('❌ Ödeme başarısız'), 400);
}

/* ═══ LANDING ═══ */
function renderLanding() {
  const bl = document.getElementById('lBal');
  const btns = document.getElementById('lBtns');

  // Hesap kapandı durumu
  if (TS.has_open_orders && TS.remaining_amount <= 0 && TS.paid_amount > 0) {
    bl.style.display = 'none';
    btns.innerHTML =
      '<div style="margin-bottom:16px;text-align:center">' +
        '<div style="font-size:48px;margin-bottom:8px">🎉</div>' +
        '<div style="font-size:18px;font-weight:800">Hesap Kapandı!</div>' +
        '<div style="font-size:13px;opacity:.7;margin-top:4px">Ödemeniz tamamlandı — Afiyet olsun!</div>' +
      '</div>' +
      '<button class="l-btn primary" onclick="openMenu()">📋 QR Menü</button>';
    return;
  }

  let h = '<button class="l-btn primary" onclick="openMenu()">' + (TS.show_bill ? '📋 QR Menü' : '📋 Sipariş Ver') + '</button>';
  if (TS.show_bill) {
    bl.textContent = 'Toplam: ' + fmt(TS.total_amount) + '  ·  Ödenen: ' + fmt(TS.paid_amount) + '  ·  Kalan: ' + fmt(TS.remaining_amount);
    bl.style.display = 'inline-block';
    h += '<button class="l-btn sec" onclick="showBill()">🧾 Hesabı Gör</button>';
  } else { bl.style.display = 'none'; }
  if (TS.show_pay) h += '<button class="l-btn sec" onclick="openPay()">💳 Ödeme Yap</button>';
  btns.innerHTML = h;
}

function goLanding() {
  document.getElementById('landing').classList.remove('hidden');
  document.getElementById('hdr').style.display = 'none';
  document.getElementById('cats').style.display = 'none';
  document.getElementById('grid').style.display = 'none';
  // refresh status
  fetch(API + '/api/table-status?qr=' + QR).then(r => r.json()).then(d => { TS = d; SID = d.session_id; renderLanding(); }).catch(() => {});
}

/* ═══ MENU ═══ */
async function openMenu() {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('hdr').style.display = 'block';
  document.getElementById('cats').style.display = 'flex';
  document.getElementById('grid').style.display = 'grid';
  if (!cats.length) await loadMenu();
}

async function loadMenu() {
  try {
    const r = await fetch(API + '/api/menu?branch=' + BRANCH);
    const d = await r.json();
    cats = d.categories || []; prods = d.products || [];
    renderCats();
    if (cats.length) selectCat(cats[0].id); else renderProds();
  } catch (e) { toast('Menü yüklenemedi'); }
}

function renderCats() {
  document.getElementById('cats').innerHTML = cats.map(c =>
    '<div class="cat' + (c.id === selCat ? ' on' : '') + '" onclick="selectCat(' + c.id + ')">' + (c.icon || '📁') + ' ' + c.name + '</div>'
  ).join('');
}

function selectCat(id) { selCat = id; renderCats(); renderProds(); }

function renderProds() {
  const f = selCat ? prods.filter(p => p.category_id === selCat) : prods;
  const g = document.getElementById('grid');
  if (!f.length) { g.innerHTML = '<div class="empty">Bu kategoride ürün yok</div>'; return; }
  g.innerHTML = f.map(p => {
    const img = p.image ? (p.image.startsWith('http') ? '<img src="' + p.image + '">' : p.image) : '🍽️';
    return '<div class="card" onclick="addItem(' + p.id + ')"><div class="card-img">' + img + '</div><div class="card-body"><h3>' + p.name + '</h3><span class="pr">' + C + Number(p.price).toFixed(2) + '</span><button class="add" onclick="event.stopPropagation();addItem(' + p.id + ')">+</button></div></div>';
  }).join('');
}

function addItem(pid) {
  const p = prods.find(x => x.id === pid); if (!p) return;
  const ex = cart.find(c => c.pid === pid);
  if (ex) ex.qty++; else cart.push({ pid: p.id, name: p.name, qty: 1, price: p.price });
  updateBar(); toast(p.name + ' eklendi');
}

/* ═══ CART ═══ */
function updateBar() {
  const cnt = cart.reduce((s, c) => s + c.qty, 0);
  const tot = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('barCnt').textContent = cnt;
  document.getElementById('barTot').textContent = C + tot.toFixed(2);
  document.getElementById('bar').style.display = cnt > 0 ? 'flex' : 'none';
}

function openCart() {
  document.getElementById('cartList').innerHTML = cart.map((c, i) =>
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0">' +
    '<span style="font-size:13px">' + c.qty + 'x ' + c.name + '</span>' +
    '<span style="font-weight:700;color:#E53E3E;font-size:13px">' + C + (c.price * c.qty).toFixed(2) + '</span>' +
    '<button onclick="rmItem(' + i + ')" style="margin-left:8px;background:#FFF5F5;border:none;border-radius:50%;width:24px;height:24px;color:#E53E3E;cursor:pointer;font-size:11px">✕</button></div>'
  ).join('');
  document.getElementById('cartTot').textContent = C + cart.reduce((s, c) => s + c.price * c.qty, 0).toFixed(2);
  document.getElementById('cartOv').classList.add('show');
}

function rmItem(i) { cart.splice(i, 1); updateBar(); if (cart.length) openCart(); else closeOv('cartOv'); }

async function sendOrder() {
  if (!cart.length) return;
  const btn = document.getElementById('orderBtn');
  btn.disabled = true; btn.textContent = 'Gönderiliyor...';
  // 15sn timeout güvenlik
  const resetTimer = setTimeout(() => { btn.disabled = false; btn.textContent = '✓ Siparişi Gönder'; toast('Zaman aşımı — tekrar deneyin'); }, 15000);
  try {
    const r = await fetch(API + '/api/order', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        branchId: BRANCH || TS.branch_id || 1, tableId: TS.table_id || 0,
        items: cart.map(c => ({ productId: c.pid, productName: c.name, qty: c.qty, unitPrice: c.price, optionPrice: 0, options: [], note: '' }))
      })
    });
    clearTimeout(resetTimer);
    const d = await r.json();
    if (d.success) {
      cart = []; updateBar(); closeOv('cartOv');
      toast('✅ Sipariş #' + d.orderNumber + ' alındı!');
      setTimeout(() => goLanding(), 1200);
    } else { toast(d.error || 'Sipariş gönderilemedi'); btn.disabled = false; btn.textContent = '✓ Siparişi Gönder'; }
  } catch (e) { clearTimeout(resetTimer); toast('Bağlantı hatası — tekrar deneyin'); btn.disabled = false; btn.textContent = '✓ Siparişi Gönder'; }
}

/* ═══ BILL ═══ */
async function showBill() {
  if (!SID) return toast('Aktif oturum yok');
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('billBody').innerHTML = '<div class="l-load">Yükleniyor...</div>';
  document.getElementById('billOv').classList.add('show');
  try {
    const r = await fetch(API + '/api/bill', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: SID }) });
    const d = await r.json();
    if (d.status !== 'ok') { closeBill(); return toast(d.error || 'Hesap yüklenemedi'); }
    let h = '';
    for (const o of d.orders || []) {
      h += '<div style="font-weight:700;font-size:13px;margin:14px 0 6px;color:#1A1A2E">Sipariş #' + o.order_number + '</div>';
      for (const it of o.items || []) {
        h += '<div class="bi"><span>' + it.qty + 'x ' + it.product_name + '</span><span>' + C + Number(it.line_total).toFixed(2) + '</span></div>';
        if (it.options?.length) for (const op of it.options) h += '<div style="font-size:11px;color:#888;padding:0 0 2px 18px">└ ' + op.name + (op.price > 0 ? ' +' + C + Number(op.price).toFixed(2) : '') + '</div>';
        if (it.note) h += '<div style="font-size:11px;color:#aaa;padding:0 0 4px 18px">📝 ' + it.note + '</div>';
      }
    }
    if ((d.payments || []).length) {
      h += '<div style="font-weight:700;font-size:13px;margin:16px 0 6px;color:#38A169">Ödemeler</div>';
      for (const p of d.payments) h += '<div class="bi" style="color:#38A169"><span>✓ ' + new Date(p.created_at).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }) + '</span><span>−' + C + Number(p.amount).toFixed(2) + '</span></div>';
    }
    h += '<div class="bt"><span>Toplam</span><span>' + C + Number(d.total_amount).toFixed(2) + '</span></div>';
    if (d.paid_amount > 0) h += '<div class="bt green"><span>Ödenen</span><span>−' + C + Number(d.paid_amount).toFixed(2) + '</span></div>';
    h += '<div class="bt red"><span>KALAN</span><span>' + C + Number(d.remaining_amount).toFixed(2) + '</span></div>';
    if (d.remaining_amount > 0) h += '<button class="sub-btn dark" onclick="closeBill();openPay()">💳 Ödeme Yap</button>';
    else h += '<div style="text-align:center;margin-top:16px;color:#38A169;font-weight:700;font-size:14px">✅ Hesap kapandı — Afiyet olsun!</div>';
    document.getElementById('billBody').innerHTML = h;
  } catch (e) { closeBill(); toast('Bağlantı hatası'); }
}

/* ═══ PAYMENT (FAZ 3) ═══ */

let _payItems = []; // bill items for checkbox selection

async function openPay() {
  // POS ödeme almış olabilir — güncel bakiyeyi kontrol et
  try { await refreshStatus(); } catch(e) {}
  if (!SID || !TS) { toast('Hesabınız kapatılmış — ödeme gerekmez'); goLanding(); return; }
  const rem = TS.remaining_amount || 0;
  if (rem <= 0) { toast('Hesap zaten ödenmiş'); goLanding(); return; }
  document.getElementById('landing').classList.add('hidden');
  const body = document.getElementById('payBody');
  body.innerHTML = '<div class="ov-title">💳 Ödeme</div><div class="l-load">Yükleniyor...</div>';
  document.getElementById('payOv').classList.add('show');

  // Bill verisi çek (ürün listesi için)
  _payItems = [];
  try {
    const r = await fetch(API + '/api/bill', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: SID }) });
    const d = await r.json();
    if (d.status === 'ok') {
      for (const o of d.orders || []) for (const it of o.items || []) _payItems.push(it);
    }
  } catch (e) {}

  const paid = TS.paid_amount || 0;
  let h = '<div class="ov-title">💳 Ödeme</div>' +
    '<div style="text-align:center;margin-bottom:16px">' +
      '<div style="font-size:13px;color:#888">Kalan Tutar</div>' +
      '<div style="font-size:28px;font-weight:800;color:#E53E3E;margin-top:4px">' + fmt(rem) + '</div>' +
    '</div>' +
    '<button class="sub-btn green" id="payFullBtn" onclick="startPay(' + rem + ')" style="margin-bottom:16px">Tamamını Öde — ' + fmt(rem) + '</button>';

  // Ürün seçerek ödeme — sadece ilk ödeme öncesi (paid=0)
  if (paid === 0 && _payItems.length > 0) {
    h += '<div style="text-align:center;color:#aaa;font-size:12px;margin:12px 0">— ürün seçerek öde —</div>';
    h += '<div id="payItemList" style="margin-bottom:12px">';
    _paySelQty = _payItems.map(() => 0);
    _payItems.forEach((it, i) => {
      const unitP = it.qty > 0 ? Math.round(it.line_total / it.qty * 100) / 100 : it.line_total;
      h += '<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f0f0f0">' +
        '<div style="flex:1">' +
          '<div style="font-size:13px;font-weight:700">' + it.product_name + '</div>' +
          '<div style="font-size:11px;color:#888">' + C + unitP.toFixed(2) + '/adet</div>';
      if (it.options?.length) for (const op of it.options) h += '<div style="font-size:10px;color:#aaa">└ ' + op.name + (op.price > 0 ? ' +' + C + Number(op.price).toFixed(2) : '') + '</div>';
      h += '</div>' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<button onclick="adjQty(' + i + ',-1)" style="width:28px;height:28px;border-radius:50%;border:1.5px solid #ddd;background:#fff;font-size:14px;cursor:pointer;color:#888">−</button>' +
          '<span id="pq' + i + '" style="min-width:20px;text-align:center;font-weight:700;font-size:14px">0</span>' +
          '<button onclick="adjQty(' + i + ',1)" style="width:28px;height:28px;border-radius:50%;border:1.5px solid #1A1A2E;background:#1A1A2E;font-size:14px;cursor:pointer;color:#fff">+</button>' +
        '</div>' +
        '<div style="min-width:40px;text-align:right;font-size:11px;color:#aaa">(max ' + it.qty + ')</div>' +
      '</div>';
    });
    h += '</div>';
    h += '<div id="paySelRow" style="display:none;margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;font-weight:800;font-size:14px;margin-bottom:8px"><span>Seçilen</span><span id="paySelTotal" style="color:#E53E3E"></span></div>' +
      '<button class="sub-btn dark" id="paySelBtn" onclick="paySelected()">Seçilenleri Öde</button>' +
    '</div>';
  }

  h += '<div style="text-align:center;color:#aaa;font-size:12px;margin:12px 0">— veya tutar gir —</div>' +
    '<div style="display:flex;gap:8px;align-items:center">' +
      '<div style="position:relative;flex:1">' +
        '<span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-weight:700;color:#888">' + C + '</span>' +
        '<input type="text" id="payInput" inputmode="decimal" placeholder="0.00" style="width:100%;padding:14px 14px 14px 30px;border:2px solid #ddd;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;outline:none" onfocus="this.style.borderColor=\'#1A1A2E\'" onblur="this.style.borderColor=\'#ddd\'">' +
      '</div>' +
      '<button class="sub-btn dark" id="payPartBtn" onclick="startPayInput()" style="margin-top:0;width:auto;padding:14px 20px;white-space:nowrap">Öde</button>' +
    '</div>' +
    '<div style="text-align:center;font-size:11px;color:#aaa;margin-top:12px">Maksimum: ' + fmt(rem) + '</div>';
  body.innerHTML = h;
}

let _paySelQty = [];

function adjQty(idx, delta) {
  const it = _payItems[idx]; if (!it) return;
  const max = it.qty || 1;
  let val = (_paySelQty[idx] || 0) + delta;
  if (val < 0) val = 0;
  if (val > max) val = max;
  _paySelQty[idx] = val;
  const el = document.getElementById('pq' + idx);
  if (el) { el.textContent = val; el.style.color = val > 0 ? '#E53E3E' : '#1A1A2E'; }
  updatePaySelection();
}

function updatePaySelection() {
  let total = 0;
  _payItems.forEach((it, i) => {
    const unitP = it.qty > 0 ? it.line_total / it.qty : it.line_total;
    total += (_paySelQty[i] || 0) * unitP;
  });
  total = Math.round(total * 100) / 100;
  const row = document.getElementById('paySelRow');
  if (total > 0) {
    row.style.display = 'block';
    document.getElementById('paySelTotal').textContent = fmt(total);
    document.getElementById('paySelBtn').textContent = 'Seçilenleri Öde — ' + fmt(total);
  } else { row.style.display = 'none'; }
}

function paySelected() {
  let total = 0;
  _payItems.forEach((it, i) => {
    const unitP = it.qty > 0 ? it.line_total / it.qty : it.line_total;
    total += (_paySelQty[i] || 0) * unitP;
  });
  total = Math.round(total * 100) / 100;
  if (total <= 0) return toast('En az bir ürün seçin');
  if (total > (TS.remaining_amount || 0) + 0.01) return toast('Kalan tutardan fazla');
  startPay(total);
}

function parseAmount(str) {
  if (!str) return 0;
  const clean = String(str).replace(/\s/g, '').replace(',', '.');
  const n = parseFloat(clean);
  return isNaN(n) ? 0 : Math.round(n * 100) / 100;
}

function startPayInput() {
  const v = parseAmount(document.getElementById('payInput')?.value);
  if (v <= 0) return toast('Geçersiz tutar');
  if (v > (TS.remaining_amount || 0) + 0.01) return toast('Kalan tutardan fazla: ' + fmt(TS.remaining_amount));
  startPay(v);
}

async function startPay(amount) {
  if (PAY_BUSY) return;
  PAY_BUSY = true;
  const btns = document.querySelectorAll('#payFullBtn,#payPartBtn');
  btns.forEach(b => { b.disabled = true; b.style.opacity = '.5'; });
  try {
    const r = await fetch(API + '/api/payment/start', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SID, amount })
    });
    const d = await r.json();
    if (d.status !== 'ok') { toast(d.message || 'Ödeme başlatılamadı'); return; }
    PAY_ID = d.payment_id;
    const body = document.getElementById('payBody');
    if (d.mock) {
      // Mock onay ekranı
      body.innerHTML =
        '<div style="text-align:center">' +
          '<div style="font-size:44px;margin:16px 0">🔒</div>' +
          '<div style="font-size:12px;color:#aaa;margin-bottom:16px">Test Modu</div>' +
          '<div style="background:#f8f9fa;border-radius:12px;padding:14px;margin-bottom:20px">' +
            '<div style="font-size:24px;font-weight:800;color:#1A1A2E">' + fmt(amount) + '</div>' +
            '<div style="font-size:12px;color:#888;margin-top:4px">' + (d.label || 'Ödeme') + '</div>' +
          '</div>' +
          '<button class="sub-btn green" id="mockOkBtn" onclick="mockConfirm(\'success\')">✓ Ödemeyi Onayla</button>' +
          '<button class="sub-btn" id="mockFailBtn" onclick="mockConfirm(\'failed\')" style="background:#EF4444;color:#fff">✕ Reddet</button>' +
          '<div style="font-size:10px;color:#aaa;margin-top:10px">Test ödeme ekranı — gerçek ödeme alınmaz</div>' +
        '</div>';
    } else {
      // Gerçek PayTR iframe
      body.innerHTML =
        '<div class="ov-title">💳 Güvenli Ödeme</div>' +
        '<iframe id="paytriframe" src="https://www.paytr.com/odeme/guvenli/' + d.token + '" frameborder="0" scrolling="no" style="width:100%;min-height:400px;border:none"></iframe>';
      try { iFrameResize({}, '#paytriframe'); } catch (e) {}
    }
  } catch (e) { toast('Bağlantı hatası'); }
  finally { PAY_BUSY = false; btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; }); }
}

async function mockConfirm(status) {
  if (!PAY_ID) return;
  const btns = document.querySelectorAll('#mockOkBtn,#mockFailBtn');
  btns.forEach(b => { b.disabled = true; b.style.opacity = '.5'; });
  try {
    const r = await fetch(API + '/api/payment/mock-callback', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payment_id: PAY_ID, status })
    });
    const d = await r.json();
    // Backend yanıtına güvenme — table-status'tan doğrula
    await refreshStatus();
    const rem = TS.remaining_amount || 0;
    if (status === 'success') paySuccess(rem);
    else { toast('Ödeme başarısız'); closePay(); }
  } catch (e) { toast('Bağlantı hatası'); closePay(); }
}

function paySuccess(remaining) {
  const body = document.getElementById('payBody');
  if (remaining <= 0) {
    body.innerHTML =
      '<div style="text-align:center;padding:20px 0">' +
        '<div style="font-size:56px;margin-bottom:12px">🎉</div>' +
        '<div style="font-size:20px;font-weight:800;margin-bottom:6px">Hesap Kapandı!</div>' +
        '<div style="color:#888;font-size:14px;margin-bottom:24px">Afiyet olsun!</div>' +
        '<button class="sub-btn green" onclick="closePay()">Tamam</button>' +
      '</div>';
  } else {
    body.innerHTML =
      '<div style="text-align:center;padding:20px 0">' +
        '<div style="font-size:56px;margin-bottom:12px">✅</div>' +
        '<div style="font-size:20px;font-weight:800;margin-bottom:6px">Ödeme Alındı!</div>' +
        '<div style="color:#888;font-size:14px;margin-bottom:8px">Kalan tutar:</div>' +
        '<div style="font-size:28px;font-weight:800;color:#E53E3E;margin-bottom:24px">' + fmt(remaining) + '</div>' +
        '<button class="sub-btn dark" onclick="closeOv(\'payOv\');openPay()">Kalan Tutarı Öde</button>' +
        '<button class="sub-btn" onclick="closePay()" style="background:#f0f0f0;color:#333">Kapat</button>' +
      '</div>';
  }
}

async function refreshStatus() {
  try {
    const r = await fetch(API + '/api/table-status?qr=' + QR);
    TS = await r.json();
    SID = TS.session_id;
  } catch (e) {}
}

function closePay() {
  closeOv('payOv');
  PAY_ID = null;
  goLanding();
}

/* ═══ UTILS ═══ */
function fmt(n) { return C + Number(n || 0).toFixed(2); }
function closeOv(id) { document.getElementById(id).classList.remove('show'); }
function closeBill() { closeOv('billOv'); goLanding(); }
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
document.addEventListener('click', e => { if (e.target.classList.contains('ov')) e.target.classList.remove('show'); });

/* ═══ TABLE-STATUS RESPONSE'A restaurant_name EKLEMESİ GEREKİYORSA ═══ */
/* table-status şu an restaurant_name dönmüyor — branch name için /api/table-info kullanılabilir */
/* Geçici çözüm: table-status'tan gelen veriyle landing'i doldur */

init();
</script>
